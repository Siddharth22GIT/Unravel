<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
        rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .login-container {
            background: transparent;
            border: 2px solid white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.774);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            padding: 0 1rem;
            color: white;
            font-size: 0.9rem;
        }

        .google-btn {
            width: 100%;
            padding: 0.8rem;
            background: white;
            opacity: 70%;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s;
            gap: 10px;
        }

        .google-btn:hover {
            opacity: 90%;
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .google-btn span {
            font-size: 1rem;
            color: #333;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            opacity: 70%;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            opacity: 100%;
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #2980b9;
        }

        .signup-btn {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 0.8rem;
        }

        .signup-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: none;
        }

        .success-message {
            color: #2ecc71;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: none;
            text-align: center;
        }

        /* Toggle between login/signup */
        #signupSection {
            display: none;
        }

        .toggle-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .toggle-text span {
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
        }

        #googleBtnHidden {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <video src="../images/aboutBackground.mp4" autoplay muted loop></video>

    <div id="g_id_onload" data-client_id="577870694438-s1lnste9u0m3prfsrcbu2dpd4hvj62gn.apps.googleusercontent.com"
        data-callback="handleGoogleCredentialResponse" data-auto_prompt="false">
    </div>
    <div id="googleBtnHidden">
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="continue_with"
            data-shape="rectangular">
        </div>
    </div>

    <div class="login-container">
        <h1 id="formTitle">Welcome Back</h1>

        <button class="google-btn" onclick="handleGoogleSignIn()">
            <img src="../images/images-removebg-preview.png" alt="Google Logo">
            <span>Continue with Google</span>
        </button>

        <div class="divider"><span>or</span></div>

        <!-- LOGIN SECTION -->
        <div id="loginSection">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
                <div class="error-message" id="loginEmailError"></div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
                <div class="error-message" id="loginPasswordError"></div>
            </div>
            <div class="success-message" id="loginSuccess"></div>
            <button class="login-btn" onclick="handleEmailLogin()">Log In</button>
            <p class="toggle-text">Not a member yet? <span onclick="showSignup()">Sign-up real quick</span></p>
        </div>

        <!-- SIGNUP SECTION -->
        <div id="signupSection">
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe" required>
                <div class="error-message" id="signupNameError"></div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required>
                <div class="error-message" id="signupEmailError"></div>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Min. 6 characters" required>
                <div class="error-message" id="signupPasswordError"></div>
            </div>
            <div class="success-message" id="signupSuccess"></div>
            <button class="login-btn" onclick="handleSignup()">Create Account</button>
            <p class="toggle-text">Already a member? <span onclick="showLogin()">Log in</span></p>
        </div>
    </div>

    <script>
        // If already logged in, redirect to index
        if (localStorage.getItem('user')) {
            window.location.href = 'index.html';
        }

        function handleGoogleSignIn() {
            google.accounts.id.prompt();
        }

        function handleGoogleCredentialResponse(response) {
            const idToken = response.credential;
            const payload = JSON.parse(atob(idToken.split('.')[1]));

            // Store user in localStorage
            localStorage.setItem('user', JSON.stringify({
                name: payload.name,
                email: payload.email,
                picture: payload.picture,
                provider: 'google'
            }));

            window.location.href = 'index.html';
        }

        async function handleEmailLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            clearErrors(['loginEmailError', 'loginPasswordError']);

            let hasError = false;
            if (!isValidEmail(email)) { showError('loginEmailError', 'Please enter a valid email'); hasError = true; }
            if (password.length < 6) { showError('loginPasswordError', 'Password must be at least 6 characters'); hasError = true; }
            if (hasError) return;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, provider: 'email' }));
                    window.location.href = 'index.html';
                } else {
                    showError('loginPasswordError', data.message || 'Invalid credentials');
                }
            } catch (err) {
                showError('loginPasswordError', 'Server error. Try again.');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            clearErrors(['signupNameError', 'signupEmailError', 'signupPasswordError']);

            let hasError = false;
            if (name.length < 2) { showError('signupNameError', 'Please enter your name'); hasError = true; }
            if (!isValidEmail(email)) { showError('signupEmailError', 'Please enter a valid email'); hasError = true; }
            if (password.length < 6) { showError('signupPasswordError', 'Password must be at least 6 characters'); hasError = true; }
            if (hasError) return;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, provider: 'email' }));
                    window.location.href = 'index.html';
                } else {
                    showError('signupEmailError', data.message || 'Signup failed');
                }
            } catch (err) {
                showError('signupEmailError', 'Server error. Try again.');
            }
        }

        function showSignup() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('signupSection').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Join Unravel';
        }

        function showLogin() {
            document.getElementById('signupSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Welcome Back';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function clearErrors(ids) {
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.textContent = '';
                el.style.display = 'none';
            });
        }
    </script>
</body>

</html>
